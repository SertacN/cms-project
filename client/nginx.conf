server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # Desteklenen diller
    set $default_lang "tr";

    # Root URL — Accept-Language header'a gore yonlendir
    location = / {
        set $lang $default_lang;

        if ($http_accept_language ~* "^en") {
            set $lang "en";
        }

        return 302 /$lang/;
    }

    # Turkce (kaynak dil)
    location /tr/ {
        alias /usr/share/nginx/html/tr/;
        try_files $uri $uri/ /tr/index.html;
    }

    # Ingilizce
    location /en/ {
        alias /usr/share/nginx/html/en/;
        try_files $uri $uri/ /en/index.html;
    }

    # Desteklenmeyen path → varsayilan dile yonlendir
    location / {
        return 302 /$default_lang/;
    }

    # Statik asset'ler icin cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
