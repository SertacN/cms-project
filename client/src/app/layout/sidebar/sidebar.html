<aside class="sidebar" [class.collapsed]="layoutService.sidebarCollapsed()">

  <!-- Header -->
  <div class="sidebar-header">
    <div class="logo">
      <lucide-icon name="layout-dashboard" [size]="20" />
    </div>
    <span class="sidebar-text logo-text">CMS Panel</span>
    <button
      class="collapse-btn"
      (click)="layoutService.toggleSidebar()"
      [matTooltip]="layoutService.sidebarCollapsed() ? 'Genişlet' : 'Daralt'"
      matTooltipPosition="right"
    >
      <lucide-icon
        [name]="layoutService.sidebarCollapsed() ? 'chevron-right' : 'chevron-left'"
        [size]="18"
      />
    </button>
  </div>

  <!-- Nav -->
  <nav class="sidebar-nav">
    <ul class="nav-list">
      @for (item of navItems; track item.path) {
        <li class="nav-item">
          <a
            [routerLink]="item.path"
            routerLinkActive="active"
            class="nav-link"
            [matTooltip]="layoutService.sidebarCollapsed() ? item.label : ''"
            matTooltipPosition="right"
          >
            <lucide-icon [name]="item.icon" [size]="20" />
            <span class="sidebar-text">{{ item.label }}</span>
          </a>
        </li>
      }
    </ul>
  </nav>

  <!-- Footer -->
  <div class="sidebar-footer">
    <button
      class="footer-btn theme-btn"
      (click)="themeService.toggleTheme()"
      [matTooltip]="layoutService.sidebarCollapsed() ? (themeService.theme() === 'light' ? 'Dark Mode' : 'Light Mode') : ''"
      matTooltipPosition="right"
    >
      <lucide-icon [name]="themeService.theme() === 'light' ? 'moon' : 'sun'" [size]="20" />
      <span class="sidebar-text">
        {{ themeService.theme() === 'light' ? 'Dark Mode' : 'Light Mode' }}
      </span>
    </button>

    <button
      class="footer-btn logout-btn"
      (click)="onLogout()"
      [matTooltip]="layoutService.sidebarCollapsed() ? 'Çıkış Yap' : ''"
      matTooltipPosition="right"
    >
      <lucide-icon name="log-out" [size]="20" />
      <span class="sidebar-text">Çıkış Yap</span>
    </button>
  </div>

</aside>
