<aside
  class="sidebar"
  [class.collapsed]="layoutService.sidebarCollapsed()"
  [class.mobile-open]="layoutService.mobileOpen()"
>

  <!-- Header -->
  <div class="sidebar-header">
    <div class="logo">
      <lucide-icon name="layout-dashboard" [size]="20" />
    </div>
    <span class="sidebar-text logo-text">CMS Panel</span>
    @if (layoutService.sidebarCollapsed()) {
      <button
        class="collapse-btn"
        (click)="layoutService.toggleSidebar()"
        matTooltip="Genişlet"
        i18n-matTooltip="@@tooltipExpand"
        matTooltipPosition="right"
      >
        <lucide-icon name="chevron-right" [size]="18" />
      </button>
    } @else {
      <button
        class="collapse-btn"
        (click)="layoutService.toggleSidebar()"
        matTooltip="Daralt"
        i18n-matTooltip="@@tooltipCollapse"
        matTooltipPosition="right"
      >
        <lucide-icon name="chevron-left" [size]="18" />
      </button>
    }
  </div>

  <!-- Nav -->
  <nav class="sidebar-nav">
    <ul class="nav-list">
      @for (item of navItems; track item.path) {
        <li class="nav-item">
          <a
            [routerLink]="item.path"
            routerLinkActive="active"
            class="nav-link"
            [matTooltip]="item.label"
            [matTooltipDisabled]="!layoutService.sidebarCollapsed()"
            matTooltipPosition="right"
          >
            <lucide-icon [name]="item.icon" [size]="20" />
            <span class="sidebar-text">{{ item.label }}</span>
          </a>
        </li>
      }
    </ul>
  </nav>

  <!-- Footer -->
  <div class="sidebar-footer">
    @if (themeService.theme() === 'light') {
      <button
        class="footer-btn theme-btn"
        (click)="themeService.toggleTheme()"
        matTooltip="Dark Mode"
        i18n-matTooltip="@@tooltipDarkMode"
        [matTooltipDisabled]="!layoutService.sidebarCollapsed()"
        matTooltipPosition="right"
      >
        <lucide-icon name="moon" [size]="20" />
        <span class="sidebar-text" i18n="@@tooltipDarkMode">Dark Mode</span>
      </button>
    } @else {
      <button
        class="footer-btn theme-btn"
        (click)="themeService.toggleTheme()"
        matTooltip="Light Mode"
        i18n-matTooltip="@@tooltipLightMode"
        [matTooltipDisabled]="!layoutService.sidebarCollapsed()"
        matTooltipPosition="right"
      >
        <lucide-icon name="sun" [size]="20" />
        <span class="sidebar-text" i18n="@@tooltipLightMode">Light Mode</span>
      </button>
    }

    <button
      class="footer-btn logout-btn"
      (click)="onLogout()"
      matTooltip="Çıkış Yap"
      i18n-matTooltip="@@menuLogout"
      [matTooltipDisabled]="!layoutService.sidebarCollapsed()"
      matTooltipPosition="right"
    >
      <lucide-icon name="log-out" [size]="20" />
      <span class="sidebar-text" i18n="@@menuLogout">Çıkış Yap</span>
    </button>
  </div>

</aside>
