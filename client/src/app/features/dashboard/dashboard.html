<div class="dashboard-container">

  <!-- Welcome banner -->
  <div class="welcome-card">
    <div class="welcome-icon">
      <lucide-icon name="sparkles" [size]="28" />
    </div>
    <div class="welcome-body">
      <h2>Hoş Geldiniz!</h2>
      <p>Dashboard'a başarıyla giriş yaptınız.</p>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-icon blue">
        <lucide-icon name="users" [size]="22" />
      </div>
      <div class="stat-content">
        <p class="stat-label">Kullanıcılar</p>
        <p class="stat-value">--</p>
      </div>
    </div>

    <div class="stat-card">
      <div class="stat-icon purple">
        <lucide-icon name="trending-up" [size]="22" />
      </div>
      <div class="stat-content">
        <p class="stat-label">İstatistikler</p>
        <p class="stat-value">--</p>
      </div>
    </div>

    <div class="stat-card">
      <div class="stat-icon green">
        <lucide-icon name="clipboard-list" [size]="22" />
      </div>
      <div class="stat-content">
        <p class="stat-label">Görevler</p>
        <p class="stat-value">--</p>
      </div>
    </div>

    <div class="stat-card">
      <div class="stat-icon orange">
        <lucide-icon name="activity" [size]="22" />
      </div>
      <div class="stat-content">
        <p class="stat-label">Aktivite</p>
        <p class="stat-value">--</p>
      </div>
    </div>
  </div>

</div>
