services:
    db:
        image: postgres:16
        container_name: cms_project_db
        restart: always
        ports:
            - "5432:5432"
        environment:
            POSTGRES_USER: sertacn
            POSTGRES_PASSWORD: e3g6y11zb3
            POSTGRES_DB: cms_project_db
        volumes:
            - postgres_data:/var/lib/postgresql/data

    redis:
        image: redis:7
        container_name: cms_project_redis
        restart: always
        ports:
            - "6379:6379"
        volumes:
            - redis_data:/data
        command: redis-server --appendonly yes

    api:
        build:
            context: ./api
            dockerfile: Dockerfile.dev
        container_name: cms_project_api
        restart: always
        ports:
            - "3000:3000"
        env_file:
            - ./api/.env
        volumes:
            - ./api/src:/app/src
        depends_on:
            - db
            - redis

    client:
        build:
            context: ./client
            dockerfile: Dockerfile.dev
        container_name: cms_project_client
        restart: always
        ports:
            - "4200:4200"
        volumes:
            - ./client/src:/app/src

volumes:
    postgres_data:
    redis_data:
