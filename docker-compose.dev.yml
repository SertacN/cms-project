services:
    db:
        image: postgres:16
        container_name: cms_project_db
        restart: always
        ports:
            - "5432:5432"
        env_file:
            - ./api/.env
        environment:
            POSTGRES_USER: ${DB_USER}
            POSTGRES_PASSWORD: ${DB_PASSWORD}
            POSTGRES_DB: ${DB_NAME}
        volumes:
            - postgres_data:/var/lib/postgresql/data

    redis:
        image: redis:7
        container_name: cms_project_redis
        restart: always
        ports:
            - "6379:6379"
        volumes:
            - redis_data:/data
        command: redis-server --appendonly yes

    api:
        build:
            context: ./api
            dockerfile: Dockerfile.dev
        container_name: cms_project_api
        restart: always
        ports:
            - "3000:3000"
        env_file:
            - ./api/.env
        volumes:
            - ./api/src:/app/src
            - ./api/prisma:/app/prisma
        depends_on:
            - db
            - redis

    client:
        build:
            context: ./client
            dockerfile: Dockerfile.dev
        container_name: cms_project_client
        restart: always
        ports:
            - "4200:4200"
        volumes:
            - ./client/src:/app/src
            - ./client/public:/app/public

volumes:
    postgres_data:
    redis_data:
